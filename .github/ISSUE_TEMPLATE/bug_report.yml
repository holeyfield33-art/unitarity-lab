name: Bug report
description: Report a reproducible bug or regression
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please provide a minimal reproduction.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of the bug
      placeholder: The audit classifier fails on empty input
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact commands and actions
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: 3.11.9
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Ubuntu 24.04
  - type: textarea
    id: logs
    attributes:
      label: Logs and traceback
      description: Paste relevant output
      render: shell