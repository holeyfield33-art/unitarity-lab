name: Notebook Validation

'on':
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-and-execute:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install notebook tooling
        run: |
          python -m pip install --upgrade pip
          pip install nbformat nbclient nbconvert ipykernel

      - name: Validate notebook schema
        run: |
          python - <<'PY'
          import nbformat
          from pathlib import Path

          notebook_path = Path('notebooks/gemma4_starter.ipynb')
          with notebook_path.open('r', encoding='utf-8') as f:
              nb = nbformat.read(f, as_version=4)
          nbformat.validate(nb)
          print('Notebook schema validation passed:', notebook_path)
          PY

      - name: Execute notebook
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute notebooks/gemma4_starter.ipynb \
            --output executed_gemma4_starter.ipynb \
            --ExecutePreprocessor.timeout=1800 \
            --ExecutePreprocessor.kernel_name=python3
